<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    display: flex;
    background-color: #f4f6f9;
}

/* Sidebar */
.sidebar {
    width: 230px;
    height: 100vh;
    background: #1e293b;
    color: white;
    padding: 20px;
}

.sidebar h2 {
    margin-bottom: 30px;
}

.sidebar ul {
    list-style: none;
}

.sidebar ul li {
    border-radius: 8px;
    margin-bottom: 10px;
}

/* links */
.sidebar ul li a {
    display: block;
    padding: 12px;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    transition: 0.3s;
}

.sidebar ul li a:hover,
.sidebar ul .active a {
    background: #3b82f6;
}

/* logout style */
.logout:hover {
    background: #ef4444 !important;
}

/* Main */
.main {
    flex: 1;
    padding: 20px;
}

/* Header */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.user {
    background: #3b82f6;
    color: white;
    padding: 8px 12px;
    border-radius: 8px;
}

/* Cards */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.card h3 {
    margin-bottom: 10px;
    color: #64748b;
}

.card p {
    font-size: 24px;
    font-weight: bold;
}

/* Table */
.table-section {
    margin-top: 30px;
}

.table-section table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 12px;
    overflow: hidden;
}

.table-section th,
.table-section td {
    padding: 14px;
    text-align: left;
}

.table-section th {
    background: #3b82f6;
    color: white;
}

.table-section tr:nth-child(even) {
    background: #f1f5f9;
}

/* Responsive */
@media (max-width: 768px) {
    .sidebar {
        display: none;
    }
}
</style>

</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>MyApp</h2>
    <ul>
        <li class="active"><a href="#">Dashboard</a></li>
        <li><a href="#">Users</a></li>
        <li><a href="#">Settings</a></li>
        <li><a href="{{ url_for('logout') }}" class="logout">Logout</a></li>
    </ul>
</div>

<!-- Main -->
<div class="main">

    <header>
        <h1>Dashboard</h1>
        <div class="user">👤 Admin</div>
    </header>

    <!-- Cards -->
    <div class="cards">
        <div class="card">
            <h3>Users</h3>
            <p>120</p>
        </div>
        <div class="card">
            <h3>Visits</h3>
            <p>1,245</p>
        </div>
        <div class="card">
            <h3>Revenue</h3>
            <p>$3,200</p>
        </div>
    </div>

    <!-- Table -->
    <div class="table-section">
        <h2 style="margin-bottom:10px;">Recent Users</h2>
        <table>
            <tr>
                <th>Name</th>
                <th>Email</th>
            </tr>
            <tr>
                <td>Amal</td>
                <td>amal@mail.com</td>
            </tr>
            <tr>
                <td>Ali</td>
                <td>ali@mail.com</td>
            </tr>
        </table>
    </div>

</div>

</body>
</html>
